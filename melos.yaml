name: riverpod3-blog-demo
packages:
  - apps/*
  - packages/*
  - migration/*

scripts:
  bootstrap:
    run: melos bootstrap
    description: Install dependencies for every package.
  build:
    run: melos exec --scope="counter_app" -- flutter pub run build_runner build --delete-conflicting-outputs
    description: Generate code for packages that use build_runner.
  analyze:
    run: |
      melos exec --scope="counter_app" -- flutter analyze
      melos exec --scope="network_retry_demo" -- flutter analyze
      melos exec --scope="stream_pause_demo" -- flutter analyze
      melos exec --scope="shared_repos" -- dart analyze .
      melos exec --scope="riverpod_v3_final" -- dart analyze .
      melos exec --scope="riverpod_v2_style" -- dart analyze .
    description: Run analyzer for Flutter and pure Dart packages.
  format:
    run: dart format .
    description: Format Dart source files.
  test:
    run: |
      melos exec --scope="counter_app" -- flutter test
      melos exec --scope="network_retry_demo" -- flutter test
      melos exec --scope="stream_pause_demo" -- flutter test
    description: Run Flutter tests for every app package.
